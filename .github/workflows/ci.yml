# ─────────────────────────────────────────────────────────────────────────────
# Dicio-Lean CI
#
# Builds a debug APK on every push and pull request and uploads it as a
# workflow artifact. No secrets, signing keys, or release steps are required —
# the APK can be downloaded directly from the "Actions" tab of the run and
# installed with "Unknown sources" enabled on an Android device.
#
# CACHE STRATEGY
#   • Gradle wrapper + dependency caches  → managed by actions/setup-java
#   • checkouts/ directory (dicio-numbers + dicio-sentences-compiler cloned by
#     the 'me.champeau.includegit' Gradle plugin)  → keyed by the
#     dicioNumbers + dicioSentencesCompiler commit hashes in libs.versions.toml.
#     Changing either commit hash automatically invalidates the cache and
#     triggers a fresh clone.
#   • sherpa-onnx .so files → keyed by SHERPA_ONNX_VERSION below.
#     Updating the version constant automatically re-downloads the library.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Bump this to pull a newer sherpa-onnx release.
  SHERPA_ONNX_VERSION: "1.13.3"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Custom cache: includegit checkouts ─────────────────────────────
      - name: Cache includegit checkouts
        uses: actions/cache@v4
        with:
          path: checkouts/
          key: includegit-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            includegit-

      # ── 4. sherpa-onnx native libraries ───────────────────────────────────
      # The .so files are not committed to the repo. They are downloaded from
      # GitHub releases and cached keyed by version. The Kotlin API source
      # files are vendored directly under app/src/main/kotlin/com/k2fsa/.
      - name: Cache sherpa-onnx native libs
        id: cache-sherpa
        uses: actions/cache@v4
        with:
          path: app/src/main/jniLibs
          key: sherpa-onnx-jni-${{ env.SHERPA_ONNX_VERSION }}

      - name: Download & extract sherpa-onnx native libs
        if: steps.cache-sherpa.outputs.cache-hit != 'true'
        run: |
          VERSION="${SHERPA_ONNX_VERSION}"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/sherpa-onnx-v${VERSION}-android.tar.bz2"
          echo "Downloading $URL"
          curl -L --retry 3 -o sherpa-onnx-android.tar.bz2 "$URL"

          echo "Extracting .so files..."
          tar -xjf sherpa-onnx-android.tar.bz2

          JNILIBS="app/src/main/jniLibs"
          for ABI in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="sherpa-onnx-v${VERSION}-android/${ABI}"
            if [ -d "$SRC" ]; then
              mkdir -p "$JNILIBS/$ABI"
              cp "$SRC"/libsherpa-onnx-jni.so "$JNILIBS/$ABI/"
              cp "$SRC"/libonnxruntime.so      "$JNILIBS/$ABI/"
              echo "  Copied $ABI"
            fi
          done

          rm -rf sherpa-onnx-android.tar.bz2 "sherpa-onnx-v${VERSION}-android"
          echo "jniLibs contents:"
          find "$JNILIBS" -name "*.so" | sort

      # ── 5. Permissions ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Tests ───────────────────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew :app:test :skill:test --continue

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            app/build/reports/tests/
            skill/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14

      # ── 7. Debug APK ───────────────────────────────────────────────────────
      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dicio-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
