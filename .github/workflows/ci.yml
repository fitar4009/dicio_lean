# ─────────────────────────────────────────────────────────────────────────────
# Dicio-Lean CI
#
# Builds a debug APK on every push and pull request and uploads it as a
# workflow artifact. No secrets, signing keys, or release steps are required —
# the APK can be downloaded directly from the "Actions" tab of the run and
# installed with "Unknown sources" enabled on an Android device.
#
# CACHE STRATEGY
#   • Gradle wrapper + dependency caches  → managed by actions/setup-java
#   • checkouts/ directory (dicio-numbers + dicio-sentences-compiler cloned by
#     the 'me.champeau.includegit' Gradle plugin)  → keyed by the
#     dicioNumbers + dicioSentencesCompiler commit hashes in libs.versions.toml.
#     Changing either commit hash automatically invalidates the cache and
#     triggers a fresh clone.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel in-progress runs for the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so that gitBranch() in app/build.gradle.kts
          # (which calls Git.open(rootDir).repository.branch via JGit) can read
          # the branch name. Without this the branch would come back as a detached
          # HEAD SHA and the debug APK's applicationId suffix would be 'HEAD'.
          fetch-depth: 0

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Caches ~/.gradle/caches and ~/.gradle/wrapper automatically.
          cache: gradle

      # ── 3. Custom cache: includegit checkouts ─────────────────────────────
      # The me.champeau.includegit plugin clones dicio-numbers and
      # dicio-sentences-compiler into checkouts/ at the project root.
      # We cache this directory keyed by the two commit SHAs declared in
      # libs.versions.toml so the cache is invalidated exactly when either
      # upstream library is bumped.
      - name: Cache includegit checkouts
        uses: actions/cache@v4
        with:
          path: checkouts/
          key: includegit-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            includegit-

      # ── 4. Permissions ─────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 5. Tests ───────────────────────────────────────────────────────────
      - name: Run unit tests
        # --continue keeps running even if one module's tests fail, so we get
        # a full report from both :app and :skill in a single run.
        run: ./gradlew :app:test :skill:test --continue

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: |
            app/build/reports/tests/
            skill/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14

      # ── 6. Debug APK ───────────────────────────────────────────────────────
      # No signing config is needed: Android Gradle Plugin automatically signs
      # debug builds with a default debug keystore generated on the fly.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dicio-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
